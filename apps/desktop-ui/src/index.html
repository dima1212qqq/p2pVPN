<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>p2pvpn desktop</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08111d;
        --accent: #6dd3ff;
        --danger: #ff8d8d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(109, 211, 255, 0.16), transparent 36%),
          radial-gradient(circle at top right, rgba(255, 141, 141, 0.18), transparent 28%),
          linear-gradient(145deg, #07101a, #0c1827 50%, #08111d);
      }

      .shell {
        width: 100%;
        max-width: 280px;
        padding: 18px;
        display: grid;
        gap: 12px;
      }

      .invite-shell {
        display: grid;
        gap: 10px;
      }

      .invite-shell[hidden] {
        display: none;
      }

      input {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 14px;
        background: rgba(8, 17, 29, 0.72);
        color: #eff6ff;
        outline: none;
      }

      input::placeholder {
        color: rgba(239, 246, 255, 0.45);
      }

      button {
        border: 0;
        width: 100%;
        min-height: 64px;
        border-radius: 18px;
        padding: 18px 28px;
        font-weight: 700;
        font-size: 18px;
        cursor: pointer;
        transition:
          transform 120ms ease,
          opacity 120ms ease,
          background 120ms ease,
          color 120ms ease;
      }

      .button-primary {
        background: linear-gradient(135deg, var(--accent), #4598ff);
        color: #07111c;
      }

      .button-danger {
        background: rgba(255, 141, 141, 0.14);
        color: var(--danger);
      }

      button:hover:enabled {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .message {
        min-height: 18px;
        text-align: center;
        font-size: 12px;
        color: rgba(239, 246, 255, 0.72);
      }

      .message[hidden] {
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="invite-shell" id="inviteShell" hidden>
        <input id="inviteInput" type="text" placeholder="Invite code" autocomplete="off" />
      </div>
      <button class="button-primary" id="actionButton" type="button">Connect</button>
      <div class="message" id="message" hidden></div>
    </main>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
